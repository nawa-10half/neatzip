# XcodeGen spec — `xcodegen generate` で NeatZip.xcodeproj を生成する。
# 設計: docs/DESIGN.md（§4 アーキテクチャ / §8 セットアップ / §9 バンドルID・エンタイトルメント / §12 MAS）
#
# 二段構え（DESIGN §12・Keka 戦略）:
#   NeatZip      … Developer ID 直配布。非サンドボックス＝元の隣に書ける。Sparkle で自動更新。
#   NeatZip-MAS  … Mac App Store 版。App Sandbox 必須・Sparkle 不可（更新は App Store 任せ）。
#                  出力は常に保存パネル（サンドボックスで powerbox 経由のみ書込可）。
# コア（CleanZipKit）と App/Resources のソースは共有。差分はビルド設定 / entitlements / `MAS` フラグのみ。
name: NeatZip

options:
  bundleIdPrefix: app.neatzip
  developmentLanguage: en   # ベース=英語。ja は Resources/ja.lproj で提供（DESIGN §14 英語化）
  deploymentTarget:
    macOS: "13.0"          # WindowGroup + .windowResizability(.contentSize) が macOS 13+
  createIntermediateGroups: true
  groupSortPosition: top

# エンジンはローカルパッケージに隔離（DESIGN.md §5 #7）。
packages:
  CleanZipKit:
    path: Packages/CleanZipKit
  # 自動アップデート（Developer ID 版のみ・DESIGN §14）。MAS 版は依存に含めない＝`#if canImport(Sparkle)`
  # で updater コードがコンパイル除外される。ネスト XPC/ヘルパーの再署名は scripts/release.sh が担当（§10）。
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"

# 全ターゲット共通のビルド設定
settings:
  base:
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"          # Swift 5 言語モード（シングルトン/DispatchQueue をそのまま通す）
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""          # ローカルは未設定（ビルド確認は CODE_SIGNING_ALLOWED=NO）
    ENABLE_HARDENED_RUNTIME: YES  # Developer ID 前提（§9）。MAS では署名時に無視される。

# 両アプリ共通の土台（ソース / 共有ビルド設定 / 共有 Info プロパティ）。
# 各ターゲットは依存・バンドル設定・Info の差分だけを足す。
targetTemplates:
  App:
    type: application
    platform: macOS
    sources:
      - App
      - Resources
    settings:
      base:
        PRODUCT_NAME: NeatZip
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      properties:
        CFBundleName: NeatZip
        CFBundleDisplayName: NeatZip
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.utilities
        # 輸出コンプラ（§12）: NeatZip は AES-256 でファイルを暗号化する＝暗号利用機能なので true が正答
        # （免除 false は HTTPS 等「OS 内蔵の付随的暗号」のみの場合。暗号が主機能のアプリには不適）。
        # ただし AES は WinZip AES/PBKDF2/HMAC＝業界標準（独自実装なし）＝mass-market 5D992.c なので
        # CCATS 不要・2021年改正で年次自己分類レポートも不要（報告義務は 5A002/5D002 の 740.17(b)(1) 品のみ）。
        # 仏宣言は France 配信時のみ＝ASC の質問票に従う。両ターゲット共通（Dev ID 版では本キーは未使用）。
        ITSAppUsesNonExemptEncryption: true
        NSHumanReadableCopyright: ""
        # 「このアプリで開く」/ Dock アイコンへのドロップで任意のファイル/フォルダを受ける宣言。
        CFBundleDocumentTypes:
          - CFBundleTypeName: "ファイル / フォルダ"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.item
        # Finder 右クリック「NeatZip でクリーンZIP」= macOS Services（§7）。両版で共通。
        # ハンドラは AppDelegate cleanZip:。NSRequiredContext は空でも必須（無いと自動表示されない）。
        NSServices:
          - NSMenuItem:
              default: "Clean ZIP with NeatZip…"
            NSMessage: cleanZip
            NSPortName: NeatZip
            NSSendFileTypes:
              - public.item
            NSRequiredContext: {}

targets:
  # ── 本体アプリ: 非サンドボックス（Developer ID）。元の隣にその場書き込み（§4） ──
  NeatZip:
    templates: [App]
    dependencies:
      - package: CleanZipKit
      - package: Sparkle                 # 自動アップデート（§14）。MAS 版には付けない。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.neatzip.NeatZip
        ENABLE_APP_SANDBOX: NO            # 非サンドボックス
    info:
      path: App/Info.plist
      properties:
        # ── Sparkle 自動アップデート（§14）。MAS 版の Info には含めない ──────────
        # appcast の公開先（GitHub Releases・最新リリースの appcast.xml を指す安定 URL）。
        SUFeedURL: https://github.com/nawa-10half/neatzip/releases/latest/download/appcast.xml
        # EdDSA 公開鍵（秘密鍵はリリース PC の Keychain。generate_keys で生成・§10）。
        SUPublicEDKey: RNOsevwcrlbpmfLAcRIZcJlXGGVHmrNht49Ww/twSjc=
        # 起動時にバックグラウンドで自動チェック。
        SUEnableAutomaticChecks: true

  # ── Mac App Store 版: App Sandbox 必須・Sparkle なし・出力は常に保存パネル（§12） ──
  NeatZip-MAS:
    templates: [App]
    dependencies:
      - package: CleanZipKit              # Sparkle は付けない（canImport が false→updater 除外）
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.neatzip.NeatZip
        CODE_SIGN_ENTITLEMENTS: App/NeatZip-MAS.entitlements
        # サンドボックス/保存パネル固定の分岐に使う（ZipController / SettingsView の `#if MAS`）。
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS
    info:
      path: App/Info-MAS.plist            # 共有プロパティのみ（SU* キー無し）を生成
