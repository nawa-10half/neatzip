# XcodeGen spec — `xcodegen generate` で NeatZip.xcodeproj を生成する。
# 設計: docs/DESIGN.md（§4 アーキテクチャ / §8 セットアップ / §9 バンドルID・エンタイトルメント）
name: NeatZip

options:
  bundleIdPrefix: app.neatzip
  developmentLanguage: en   # ベース=英語。ja は Resources/ja.lproj で提供（DESIGN §14 英語化）
  deploymentTarget:
    macOS: "13.0"          # WindowGroup + .windowResizability(.contentSize) が macOS 13+
  createIntermediateGroups: true
  groupSortPosition: top

# エンジンはローカルパッケージに隔離（DESIGN.md §5 #7）。SSZipArchive 依存は CleanZipKit が所有
packages:
  CleanZipKit:
    path: Packages/CleanZipKit
  # 自動アップデート（Developer ID 直配布なので Sparkle 2 を採用・DESIGN §14）。
  # ネスト XPC/ヘルパーの再署名は scripts/release.sh が担当（§10）。
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"

# 全ターゲット共通のビルド設定
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"          # Swift 5 言語モード（シングルトン/DispatchQueue をそのまま通す）
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""          # ローカルは未設定（ビルド確認は CODE_SIGNING_ALLOWED=NO）
    ENABLE_HARDENED_RUNTIME: YES  # Developer ID 前提（§9）

targets:
  # ── 本体アプリ: 非サンドボックス（Developer ID）。元の隣にその場書き込み（§4） ──
  NeatZip:
    type: application
    platform: macOS
    sources:
      - App
      - Resources
    dependencies:
      - package: CleanZipKit
      - package: Sparkle                 # 自動アップデート（§14）
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.neatzip.NeatZip
        PRODUCT_NAME: NeatZip
        ENABLE_APP_SANDBOX: NO            # 本体はサンドボックス OFF
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        CFBundleName: NeatZip
        CFBundleDisplayName: NeatZip
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.utilities
        ITSAppUsesNonExemptEncryption: false
        NSHumanReadableCopyright: ""
        # ── Sparkle 自動アップデート（§14）──────────────────────────────────
        # appcast の公開先。GitHub Releases 配信: 「最新リリースの appcast.xml アセット」を
        # 指す安定 URL（Pages 不要・各リリースで appcast.xml を再アップロードすれば不変）。
        # 将来 neatzip.app を取得したらこの値だけ差し替える。
        SUFeedURL: https://github.com/nawa-10half/neatzip/releases/latest/download/appcast.xml
        # EdDSA 公開鍵（秘密鍵はリリース PC の Keychain。generate_keys で生成・§10）。
        SUPublicEDKey: RNOsevwcrlbpmfLAcRIZcJlXGGVHmrNht49Ww/twSjc=
        # 起動時にバックグラウンドで自動チェック（初回の許可ダイアログを出さず即有効化）。
        SUEnableAutomaticChecks: true
        # 「このアプリで開く」/ Dock アイコンへのドロップで任意のファイル/フォルダを受けるための宣言。
        # public.item は全ファイル・フォルダの基底 UTI。Alternate ランクで既定ハンドラにはしない。
        CFBundleDocumentTypes:
          - CFBundleTypeName: "ファイル / フォルダ"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.item
        # ── Finder 右クリック「NeatZip でクリーンZIP」= macOS Services（§7）──────
        # 旧 Finder Sync 拡張は全マウントボリュームを claim していたため、外付けディスクの
        # アイコンが NeatZip に化ける副作用があった。これを廃して Services に移行した。
        # NSSendFileTypes を public.item（ファイル/フォルダのみ）に絞り、テキスト等の文脈には
        # 出さない＝Finder で競合サービスが少なく右クリック直下に出やすい。タイトルは
        # ServicesMenu.strings（en/ja）でローカライズ。ハンドラは本体（非サンドボックス）の
        # AppDelegate cleanZip:。NSRequiredContext は空でも必須（無いと自動表示されない）。
        NSServices:
          - NSMenuItem:
              default: "Clean ZIP with NeatZip…"
            NSMessage: cleanZip
            NSPortName: NeatZip
            NSSendFileTypes:
              - public.item
            NSRequiredContext: {}
